<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Bali Girls — Back Shortly</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 50% 35%, #1a120a 0%, #0a0703 70%);
      color: #d6d3cc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 520px;
      border: 1px solid rgba(200, 156, 79, 0.25);
      background: rgba(20, 14, 8, 0.55);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(2px);
    }
    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 2rem;
      border: 1px solid rgba(200, 156, 79, 0.45);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c89c4f;
      font-family: "Times New Roman", serif;
      font-size: 1.75rem;
      letter-spacing: 0.05em;
    }
    h1 {
      font-weight: 300;
      font-size: 1.6rem;
      letter-spacing: 0.18em;
      color: #c89c4f;
      margin-bottom: 1.25rem;
      text-transform: uppercase;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #9c958a;
      margin-bottom: 0.9rem;
    }
    .small {
      margin-top: 2rem;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: rgba(200, 156, 79, 0.55);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" aria-hidden="true">BG</div>
    <h1>Back Shortly</h1>
    <p>Bali Girls is undergoing scheduled maintenance.</p>
    <p>The site will be back online soon. Thanks for your patience.</p>
    <div class="small">baligirls.gaiada2.online</div>
  </main>
</body>
</html>
